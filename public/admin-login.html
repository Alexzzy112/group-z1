<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | PlagScan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-container {
            max-width: 400px;
            margin: 10vh auto;
            padding: 3rem;
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 0.5rem;
        }

        .input-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .input-group input {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            font-family: 'Outfit', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #login-error {
            color: var(--danger-color);
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar glass-effect">
        <div class="logo">
            <i data-lucide="shield-check" class="logo-icon"></i>
            <span>GROUP-Z1</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Student Portal</a>
        </div>
    </nav>

    <main class="container">
        <div class="login-container glass-effect">
            <i data-lucide="lock"
                style="width: 48px; height: 48px; color: var(--primary-color); margin-bottom: 1rem;"></i>
            <h2>Admin Login</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">Use your admin credentials
                to access the dashboard.</p>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <span id="login-error">Invalid credentials. Try admin / password.</span>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Login</button>
            </form>
        </div>
    </main>

    <script src="admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
